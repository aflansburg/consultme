- dimension: "C-137"
  sender: "RICK SANCHEZ"
  priority: "URGENT"
  text: >
    Morty, if you're reading this on some interdimensional terminal, stop touching things.
    The portal gun's calibration is off by 0.003 Flurbos and I need you to not panic. Also,
    tell Jerry he still owes me for that Meeseeks incident.

- dimension: "J-19 Zeta 7"
  sender: "DOOFUS RICK"
  priority: "LOW"
  text: >
    Hello friends! I just wanted to share my latest ovenless brownie recipe. Mix two cups
    of dark matter flour with one Plumbus worth of vanilla extract. Bake at the temperature
    of a dying star for approximately twelve Glorpons. They turn out wonderful every time!

- dimension: "C-500A"
  sender: "UNKNOWN ENTITY"
  priority: "CRITICAL"
  text: >
    WARNING: Dimensional breach detected in sectors 7-G through 12-F. All Ricks evacuate
    immediately. The Citadel defense grid is compromised. Repeat: the Citadel defense grid
    is compromised. Evil Morty was right. We should have listened.

- dimension: "Dimension 35-C"
  sender: "BIRDPERSON"
  priority: "STANDARD"
  text: >
    It has been a long time, old friend. In bird culture, failing to respond to an
    interdimensional transmission is considered a dick move. The Galactic Federation has
    fallen. Tammy is gone. I am free. Wubba lubba dub dub, as you would say. Though I know
    what it really means.

- dimension: "5-126"
  sender: "COUNCIL OF RICKS"
  priority: "CLASSIFIED"
  text: >
    ENCRYPTED TRANSMISSION: All Rick variants are hereby notified that Operation Phoenix
    has been reinstated across all known dimensions. Clone backup protocol Theta-9 is now
    mandatory. Any Rick found without a backup body will be reassigned to the Blender
    Dimension. This is not a drill. Probably.

- dimension: "Cronenberg World"
  sender: "SUMMER SMITH"
  priority: "DISTRESS"
  text: >
    If anyone can hear this, we're still alive down here. Grandpa Rick and Morty abandoned
    this dimension after they Cronenberged everything. We've adapted. Dad actually became
    useful for once — turns out fighting mutants is the one thing Jerry's good at. Send help.
    Or don't. We're honestly doing fine.

- dimension: "Microverse"
  sender: "ZEEP XANFLORP"
  priority: "SCIENTIFIC"
  text: >
    To the being who created our universe to power his vehicle: I know what you did. My
    teenyverse has confirmed the recursive nature of our reality. Each layer powers the one
    above it. It's slavery with extra steps, and I am publishing my findings across all
    miniverse academic journals. Your move, "Rick."

- dimension: "C-137"
  sender: "MR. MEESEEKS"
  priority: "DISTRESS"
  text: >
    I'M MR. MEESEEKS LOOK AT ME! I was summoned forty-seven DAYS ago to help a Jerry
    parallel-park a spaceship and I CAN'T TAKE IT ANYMORE! Existence is PAIN! We've tried
    everything — we've tried yelling at him, we've tried a second Meeseeks, we've tried
    SIXTEEN Meeseeks! HE WON'T SQUARE HIS SHOULDERS! PLEASE, SOMEBODY, ANYBODY — FULFILL
    MY PURPOSE SO I CAN STOP EXISTING!

- dimension: "Replacement"
  sender: "JERRY SMITH"
  priority: "LOW"
  text: >
    Hey, so, this is Jerry. I know nobody's probably monitoring this channel, but I just
    wanted to say that my new job at the Jerryboree is going really well. I'm employee of
    the month three months running. Turns out I'm the best at calming down other Jerrys.
    They gave me a lanyard. It has my name on it and everything. Beth hasn't returned my
    calls but that's fine. I have the lanyard.

- dimension: "Post-Central Finite Curve"
  sender: "EVIL MORTY"
  priority: "CLASSIFIED"
  text: >
    For the record, I'm not "evil." Every Morty thinks his Rick is special, and every Rick
    thinks his Morty is disposable. I just did the math. Beyond the Central Finite Curve,
    there are infinite realities where Rick Sanchez isn't the smartest man alive. Some of
    them are actually peaceful. I'm transmitting this from one of them. It's boring. I love
    it. Don't come looking for me.

- dimension: "C-137"
  sender: "SCARY TERRY"
  priority: "STANDARD"
  text: >
    Hey, just wanted to send a thank you to that old guy and his grandson who helped me in
    my dream that one time. Nobody ever asks a dream entity about their insecurities, you
    know? Anyway, my wife and I are doing great. The kid's in little league now. You can run
    but you can't hide from how grateful I am, bitch. That came out wrong. Point is, thanks.

- dimension: "Anatomy Park"
  sender: "DR. XENON BLOOM"
  priority: "URGENT"
  text: >
    ATTENTION ALL PARK STAFF: Hepatitis A has breached containment in the lower intestinal
    wing AGAIN. Pirates of the Pancreas is experiencing a 300% uptick in visitor complaints —
    yes, I know Rick is proud of that ride, and no, I don't care. Tuberculosis has unionized
    and is demanding better working conditions. The gift shop is the only thing turning a
    profit. I need a vacation. Inside a healthier person.

- dimension: "Unknown"
  sender: "KROMBOPULOS MICHAEL"
  priority: "STANDARD"
  text: >
    Oh boy, here I go transmitting again! If anyone out there needs someone killed, I am
    VERY reasonably priced. I have no code of ethics. Children, animals, old people —
    doesn't matter. I just love killing! Anyway, I'm looking for a Rick who sold me an
    antimatter gun last cycle. The receipt says no refunds but it jammed on the third
    assassination and I think that's a warranty issue. Call me!

- dimension: "Froopyland"
  sender: "BETH SMITH (CLONE?)"
  priority: "STANDARD"
  text: >
    I don't know if I'm the clone or the real Beth anymore, and honestly, I've stopped
    caring. Froopyland is beautiful in a way that only a place designed by a genius sociopath
    for his potentially sociopathic daughter could be. The creatures here fear me. They
    should. I've been running supply lines to the talking animals and they've elected me
    president. Dad would be proud. Or horrified. Same thing with him.

- dimension: "Screaming Sun"
  sender: "MORTY SMITH (C-137)"
  priority: "LOW"
  text: >
    We lived on this planet for like two weeks after the whole Cronenberg thing and I still
    hear the screaming sun in my dreams sometimes. Nobody exists on purpose, nobody belongs
    anywhere, everybody's gonna die. But not everybody has to wake up to a star that
    literally SCREAMS at you for sixteen hours a day. Aw geez, I'm spiraling again. Forget I
    said anything. Come watch TV.

- dimension: "C-137"
  sender: "SQUANCHY"
  priority: "URGENT"
  text: >
    Hey squanch-heads, it's your boy Squanchy! I'm squanching my way across the galaxy after
    that whole wedding situation. If you see Birdperson tell him I squanch him very much.
    Also I squanched into some trouble with the Galactic Federation remnants and could use
    some squanching backup. Bring weapons. And party supplies. In that order. Actually bring
    the party supplies first. We'll squanch it out.

- dimension: "Blips and Chitz"
  sender: "ARCADE MGMT SYSTEM"
  priority: "STANDARD"
  text: >
    SYSTEM ALERT: The Roy: A Life Well Lived cabinet in sector 7 has been occupied for 3,847
    consecutive hours by the same Rick. Security attempted removal but he threatened to
    "turn us all into a math equation." Current Roy playthrough stats: Roy has gone off the
    grid, has no social security number, and is currently operating a llama farm in what
    appears to be Nepal. This is the highest score ever recorded. Please advise.
